# Omakase Ruby styling for Rails
inherit_gem: { rubocop-rails-omakase: rubocop.yml }

# Load custom cops
require:
  - ./lib/rubocop/cop/custom/ternary_line_breaks

# Load plugins
plugins:
  - rubocop-sorbet

# Enable custom cops
Custom/TernaryLineBreaks:
  Enabled: true

# Enable Sorbet cops
Sorbet/BlockMethodDefinition:
  Enabled: true
  
Sorbet/Refinement:
  Enabled: true

# Remove unnecessary parentheses from method calls
Style/MethodCallWithArgsParentheses:
  Enabled: true
  EnforcedStyle: omit_parentheses
  AllowParenthesesInMultilineCall: false
  AllowParenthesesInChaining: false
  AllowParenthesesInCamelCaseMethod: false

# Overwrite or add rules to create your own house style

# Set maximum line length
Layout/LineLength:
  Max: 80
  AllowURI: true
  URISchemes:
    - http
    - https

# Set maximum method length
Metrics/MethodLength:
  Max: 20
  CountComments: false  # Don't count comment lines
  CountAsOne: []  # You can specify what to count as one line (e.g., ['array', 'hash', 'heredoc'])
